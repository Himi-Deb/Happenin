kind = "web"
previewPath = "/"
title = "Happenin* — Find & Host Free Events"
version = "1.0.0"
id = "artifacts/happenin-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19183

[services.development]
run = "pnpm --filter @workspace/happenin-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/happenin-web", "run", "build" ]
publicDir = "artifacts/happenin-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19183"
BASE_PATH = "/"
